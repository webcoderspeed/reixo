name: Bundle Size

# Measures the real gzipped cost of the package on every PR and posts a diff
# comment so reviewers can see the size impact before merging.
# Example comment: "dist/index.mjs: 31.7 KB (+0.4 KB, +1.3%)"
on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write # post the size diff comment

jobs:
  size-limit:
    name: Bundle Size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Size Limit
        uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Runs `npm run size` on both the base branch and the PR branch,
          # then posts the diff as a PR comment. 'size' is defined in
          # package.json scripts: "size": "size-limit"
          script: npm run size
