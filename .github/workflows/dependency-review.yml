name: Dependency Review

# Scans every PR for newly introduced dependencies that have known CVEs.
# Blocks the merge if any dependency with severity >= high is added.
# Free for all public repos — uses GitHub's own advisory database.
on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write # post a comment with the vulnerability summary

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce HIGH or CRITICAL vulnerabilities.
          # Change to 'critical' if you want to allow high-severity through.
          fail-on-severity: high
          # Post a summary comment on the PR so reviewers can see at a glance
          # which packages are flagged without clicking into the action log.
          comment-summary-in-pr: always
