name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false # never cancel an in-flight release

jobs:
  # ─────────────────────────────────────────────
  # Guard: full CI gate before releasing
  # ─────────────────────────────────────────────
  ci-check:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint:check

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # Semantic Release
  # ─────────────────────────────────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: write # create tags + GitHub releases
      issues: write # comment on released issues
      pull-requests: write # comment on released PRs + open changelog PR
      id-token: write # npm provenance

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false # semantic-release manages its own git auth

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release

      # ── After a successful release, open a PR with CHANGELOG + version bump ──
      # semantic-release writes CHANGELOG.md and updates package.json in-place
      # but can't push them directly to main (branch protection). This step
      # creates a branch and opens a PR so you can merge it normally.
      - name: Open changelog PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If no files were changed, semantic-release found nothing to release
          if git diff --quiet -- CHANGELOG.md package.json package-lock.json; then
            echo "No release changes detected — skipping changelog PR."
            exit 0
          fi

          VERSION=$(node -p "require('./package.json').version")
          BRANCH="chore/release-v${VERSION}"

          # Configure git identity for the bot commit
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Re-attach credentials (persist-credentials: false was set above for semantic-release)
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Create branch, commit, push
          git checkout -b "$BRANCH"
          git add CHANGELOG.md package.json package-lock.json
          git commit -m "chore(release): ${VERSION} [skip ci]"
          git push origin "$BRANCH"

          # Build PR body in a variable to avoid YAML multiline quoting issues
          PR_BODY="## Release v${VERSION}

          This PR was automatically generated by the release pipeline.

          The npm package has already been published and the GitHub Release + git tag have been created. This PR just brings the repo's CHANGELOG.md and version files in sync.

          **What's included:**
          - CHANGELOG.md updated with release notes for v${VERSION}
          - package.json / package-lock.json version bumped to ${VERSION}

          Merge this PR to keep the repo history in sync with the published release."

          gh pr create \
            --title "chore(release): ${VERSION}" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH"
