name: Release (manual fallback)

# The primary release path is the `release` job inside ci.yml.
# This workflow exists only as a manual escape hatch — use it when you
# need to cut a release without pushing a new commit (e.g. after fixing
# a broken NPM_TOKEN or recovering from a failed release mid-flight).
on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false # never cancel an in-flight release — queue instead

jobs:
  release:
    name: Semantic Release (manual)
    runs-on: ubuntu-latest
    permissions:
      contents: write # push release tag + chore(release) commit
      issues: write # comment on released issues
      pull-requests: write # comment on released PRs
      id-token: write # npm provenance attestation

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release
