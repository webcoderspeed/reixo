name: Release

# Triggers only after the "CI" workflow completes successfully on main.
# This makes CI → Release sequential and eliminates the duplicate CI gate
# that existed when both workflows triggered independently on push.
on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

concurrency:
  group: release
  cancel-in-progress: false # never cancel an in-flight release — queue instead

jobs:
  release:
    name: Semantic Release

    # Only proceed when CI actually passed (not cancelled / failed)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags + GitHub releases
      issues: write # comment on released issues
      pull-requests: write # comment on released PRs
      id-token: write # npm provenance

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Check out the exact commit that CI ran on, not whatever
          # happens to be at HEAD right now.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false # semantic-release manages its own git auth

      # ── KEY FIX ──────────────────────────────────────────────────────────
      # @semantic-release/git pushes a "chore(release): x.x.x [skip ci]"
      # commit back to origin/main at the end of every release.  If this
      # workflow was queued (cancel-in-progress: false) and starts only AFTER
      # that commit landed, the checked-out SHA is behind origin/main and
      # semantic-release refuses to run.  Fast-forwarding here ensures the
      # local branch always matches origin/main before semantic-release runs.
      - name: Fast-forward to latest origin/main
        run: |
          git fetch origin
          git checkout main
          git reset --hard origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release
