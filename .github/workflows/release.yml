name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false # never cancel an in-flight release

jobs:
  # ─────────────────────────────────────────────
  # Guard: full CI gate before releasing
  # ─────────────────────────────────────────────
  ci-check:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint:check

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # Semantic Release
  # ─────────────────────────────────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: write # create tags + GitHub releases
      issues: write # comment on released issues
      pull-requests: write # comment on released PRs
      id-token: write # npm provenance

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false # semantic-release manages its own git auth

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release
